<div class="login-card p-4 shadow-lg animate__animated animate__fadeInDown">
  <div class="text-center mb-4">
    <div class="logo-placeholder mb-3">
      <img src="assets/images/slm.png" alt="SLM Logo" class="img-fluid" style="max-height: 150px; object-fit: contain;" />
    </div>
    <h3 class="fw-bold">Welcome Back</h3>
    <p class="text-muted small">Please enter your credentials to login</p>
  </div>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
    <div class="mb-3">
      <label class="form-label fw-semibold">Email Address</label>
      <div class="input-group">
        <span class="input-group-text bg-transparent border-end-0">
          <i class="bi bi-envelope text-muted"></i>
        </span>
        <input type="email" formControlName="email" class="form-control border-start-0 ps-0" 
               [ngClass]="{ 'is-invalid': submitted && f['email'].errors }" placeholder="name@example.com">
      </div>
      <div *ngIf="submitted && f['email'].errors" class="invalid-feedback d-block">
        <div *ngIf="f['email'].errors['required']">Email is required</div>
        <div *ngIf="f['email'].errors['email']">Email must be a valid email address</div>
      </div>
    </div>

    <div class="mb-4">
      <div class="d-flex justify-content-between align-items-center mb-1">
        <label class="form-label fw-semibold mb-0">Password</label>
        <a routerLink="/auth/forgot-password" class="text-primary text-decoration-none small">Forgot Password?</a>
      </div>
      <div class="input-group">
        <span class="input-group-text bg-transparent border-end-0">
          <i class="bi bi-lock text-muted"></i>
        </span>
        <input type="password" formControlName="password" class="form-control border-start-0 ps-0" 
               [ngClass]="{ 'is-invalid': submitted && f['password'].errors }" placeholder="Enter your password">
      </div>
      <div *ngIf="submitted && f['password'].errors" class="invalid-feedback d-block">
        <div *ngIf="f['password'].errors['required']">Password is required</div>
      </div>
    </div>

    <div *ngIf="error" class="alert alert-danger mb-3 p-2 small border-0" role="alert">
      <i class="bi bi-exclamation-triangle-fill me-2"></i> {{error}}
    </div>

    <button [disabled]="loading" class="btn btn-primary w-100 py-2 fw-bold shadow-sm d-flex align-items-center justify-content-center">
      <app-loader size="small" *ngIf="loading"  class="me-2"  role="status" aria-hidden="true"></app-loader>
      Login
    </button>
  </form>

  <div class="text-center mt-4 pt-2">
    <p class="text-muted small">Don't have an account? <a href="https://mbrdigitechsolutions.net/contact" target="_blank" rel="noopener noreferrer" class="text-primary fw-bold text-decoration-none">Contact Admin</a></p>
  </div>
</div>
