<div class="layout-container p-4">
  <div class="header-actions d-flex flex-column flex-lg-row justify-content-between align-items-center mb-4 bg-white p-3 rounded-3 shadow-sm gap-3">
    <div class="d-flex align-items-center gap-3 text-nowrap">
      <i class="bi bi-compass fs-3 text-primary"></i>
      <h4 class="mb-0 fw-bold">Library Seating Layout</h4>
    </div>

    <div class="floor-selector">
      <select class="form-select rounded-pill px-4 shadow-sm border-0 bg-light"
              [ngModel]="selectedFloorId"
              (ngModelChange)="onFloorChange($event)">
        <option *ngFor="let floor of floors" [value]="floor.id">
          🏢 {{ floor.name }}
        </option>
      </select>
    </div>

    <div class="legend d-flex flex-wrap justify-content-center align-items-center gap-3 small fw-bold">
      <div class="d-flex align-items-center gap-2 text-nowrap">
        <span class="dot bg-success"></span> Batch Available
      </div>
      <div class="d-flex align-items-center gap-2 text-nowrap">
        <span class="dot bg-warning"></span> Batch Occupied
      </div>
      <div class="d-flex align-items-center gap-2 text-nowrap">
        <span class="dot bg-danger"></span> <span class="text-danger">Time Overlap</span>
      </div>
      
      <!-- Edit Controls -->
      <div class="d-flex flex-wrap justify-content-center align-items-center gap-2">
        <button class="btn btn-sm text-nowrap" [ngClass]="isEditMode ? 'btn-danger' : 'btn-outline-primary'" (click)="toggleEditMode()">
          <i class="bi" [ngClass]="isEditMode ? 'bi-x-circle' : 'bi-pencil-square'"></i> 
          {{ isEditMode ? 'Cancel Edit' : 'Edit Layout' }}
        </button>
        <button *ngIf="isEditMode" class="btn btn-sm btn-success text-nowrap" (click)="saveLayout()">
          <i class="bi bi-save"></i> Save Layout
        </button>
      </div>
    </div>
  </div>

  <div class="layout-grid" [class.edit-mode]="isEditMode">
    <div *ngFor="let table of tables"
         class="table-item rectangle"
         [class.draggable]="isEditMode"
         [style.left.px]="table.xAxis || 0"
         [style.top.px]="table.yAxis || 0">
         
      <!-- Drag Handle for Edit Mode -->
      <div *ngIf="isEditMode" class="drag-handle" (mousedown)="onMouseDown($event, table)">
        <i class="bi bi-arrows-move"></i>
      </div>

      <div class="table-content">
        <div class="table-id">{{ table.tableNumber }}</div>
        <div class="seat-info">Seat {{ table.seatNumber }}</div>
      </div>

      <!-- Chairs: Number of chairs = number of batches -->
      <div class="chairs">
        <div *ngFor="let b of getTableBatches(table.id); let j = index"
             class="chair"
             [ngClass]="['pos-' + j, b.isOverlap ? 'overlap' : (b.isOccupied ? 'occupied' : 'available')]"
             [style.cursor]="(!b.isOccupied && !b.isOverlap && authService.hasPermission('TABLE_REGISTRATION')) ? 'pointer' : 'default'"
             [title]="b.name + (b.isOverlap ? ' ⚠ Time Overlap — Cannot Book' : (b.isOccupied ? ' (Occupied)' : (!authService.hasPermission('TABLE_REGISTRATION') ? '' : ' — Click to Register')))"
             (click)="onBatchClick($event, table, b)">
          <span class="batch-name-label">{{ b.name }}</span>
          <span *ngIf="b.isOverlap" class="overlap-label">⚠ Overlap</span>
        </div>
      </div>
    </div>

    <div *ngIf="tables.length === 0" class="no-tables text-muted">
      <i class="bi bi-inbox fs-1 d-block mb-3"></i>
      No tables found for this floor.
    </div>
  </div>
</div>

<!-- Registration Modal — opened when clicking an available batch chair -->
<div class="modal fade" id="layoutRegModal" tabindex="-1" aria-labelledby="layoutRegModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content border-0 rounded-4 shadow">
      <div class="modal-header border-0 px-4 pt-4 pb-2">
        <h5 class="modal-title fw-bold" id="layoutRegModalLabel">
          <i class="bi bi-person-plus-fill me-2 text-primary"></i>New Registration
        </h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" (click)="onRegCancelled()"></button>
      </div>
      <div class="modal-body px-4 pb-4">
        <app-registration-form
          *ngIf="preselectedRegistration"
          [registrationData]="preselectedRegistration"
          (saved)="onRegSaved()"
          (cancelled)="onRegCancelled()">
        </app-registration-form>
      </div>
    </div>
  </div>
</div>
