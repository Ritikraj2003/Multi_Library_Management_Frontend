<form [formGroup]="libraryForm" (ngSubmit)="onSubmit()" class="p-2">
  <div class="row g-3">
    <div class="col-12">
      <label class="form-label fw-bold small text-muted">Library Name</label>
      <input type="text" formControlName="name" class="form-control rounded-3" placeholder="e.g. Kautaly Library"
        [class.is-invalid]="libraryForm.get('name')?.touched && libraryForm.get('name')?.invalid">
      <div class="invalid-feedback">Name is required</div>
    </div>

    <div class="col-12">
      <label class="form-label fw-bold small text-muted">Address</label>
      <textarea formControlName="address" class="form-control rounded-3" rows="2" placeholder="Full address..."
        [class.is-invalid]="libraryForm.get('address')?.touched && libraryForm.get('address')?.invalid"></textarea>
      <div class="invalid-feedback">Address is required</div>
    </div>

    <div class="col-md-6">
      <label class="form-label fw-bold small text-muted">City</label>
      <input type="text" formControlName="city" class="form-control rounded-3" placeholder="City"
        [class.is-invalid]="libraryForm.get('city')?.touched && libraryForm.get('city')?.invalid">
    </div>

    <div class="col-md-6">
      <label class="form-label fw-bold small text-muted">State</label>
      <input type="text" formControlName="state" class="form-control rounded-3" placeholder="State"
        [class.is-invalid]="libraryForm.get('state')?.touched && libraryForm.get('state')?.invalid">
    </div>

    <div class="col-md-6">
      <label class="form-label fw-bold small text-muted">Pincode</label>
      <input type="text" formControlName="pincode" class="form-control rounded-3" placeholder="Pincode"
        [class.is-invalid]="libraryForm.get('pincode')?.touched && libraryForm.get('pincode')?.invalid">
    </div>

    <div class="col-md-6">
      <label class="form-label fw-bold small text-muted">Mobile Number</label>
      <input type="text" formControlName="mobile" class="form-control rounded-3" placeholder="10-digit mobile"
        [class.is-invalid]="libraryForm.get('mobile')?.touched && libraryForm.get('mobile')?.invalid">
      <div class="invalid-feedback">Valid 10-digit mobile is required</div>
    </div>

    <div class="col-12">
      <label class="form-label fw-bold small text-muted">Email Address</label>
      <input type="email" formControlName="email" class="form-control rounded-3" placeholder="email@example.com"
        [class.is-invalid]="libraryForm.get('email')?.touched && libraryForm.get('email')?.invalid">
      <div class="invalid-feedback">Valid email is required</div>
    </div>

    <div class="col-md-6">
      <label class="form-label fw-bold small text-muted">Library Icon</label>
      <div class="d-flex align-items-start gap-2">
        <div class="rounded-3 border overflow-hidden bg-light mb-2" style="width: 60px; height: 60px;" *ngIf="libraryIconPreview">
          <img [src]="libraryIconPreview" class="img-fluid w-100 h-100 object-fit-cover">
        </div>
        <input type="file" (change)="onFileChange($event, 'icon')" class="form-control rounded-3" accept="image/*">
      </div>
    </div>

    <div class="col-md-6">
      <label class="form-label fw-bold small text-muted">Document Type</label>
      <select formControlName="documentType" class="form-select rounded-3">
        <option value="">Select Document</option>
        <option value="Aadhar">Aadhar Card</option>
        <option value="PAN">PAN Card</option>
        <option value="VoterID">Voter ID</option>
        <option value="DrivingLicense">Driving License</option>
      </select>
    </div>

    <div class="col-12">
      <label class="form-label fw-bold small text-muted">Document Image</label>
      <div class="d-flex align-items-start gap-2">
        <div class="rounded-3 border overflow-hidden bg-light mb-2" style="width: 60px; height: 60px;" *ngIf="documentImagePreview">
          <img [src]="documentImagePreview" class="img-fluid w-100 h-100 object-fit-cover">
        </div>
        <input type="file" (change)="onFileChange($event, 'document')" class="form-control rounded-3" accept="image/*">
      </div>
    </div>

    <div class="col-12 mt-3">
      <div class="form-check form-switch p-3 bg-light rounded-3 d-flex align-items-center justify-content-between">
        <div>
          <label class="form-check-label fw-bold small text-muted mb-0">Library Active Status</label>
          <p class="text-muted extra-small mb-0">Enable or disable this library in the system</p>
        </div>
        <input class="form-check-input mt-0 fs-4" type="checkbox" role="switch" formControlName="isActive">
      </div>
    </div>
  </div>

  <div class="mt-4 d-flex justify-content-end gap-2 border-top pt-3">
    <button type="button" class="btn btn-light rounded-3 px-4" (click)="cancelled.emit()" [disabled]="loading">Cancel</button>
    <button type="submit" class="btn btn-primary rounded-3 px-4 shadow-sm" [disabled]="loading">
      <app-loader size="small" *ngIf="loading"  class="me-2" ></app-loader>
      {{ isEdit ? 'Update Library' : 'Create Library' }}
    </button>
  </div>
</form>
