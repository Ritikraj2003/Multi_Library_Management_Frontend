<form [formGroup]="userForm" (ngSubmit)="onSubmit()" class="p-2">
  <div class="row g-3">
    <div class="col-12">
      <label class="form-label fw-bold small text-muted">Full Name</label>
      <input type="text" formControlName="fullName" class="form-control rounded-3" placeholder="John Doe"
        [class.is-invalid]="userForm.get('fullName')?.touched && userForm.get('fullName')?.invalid">
    </div>

    <div class="col-md-6">
      <label class="form-label fw-bold small text-muted">Mobile Number</label>
      <input type="text" formControlName="mobile" class="form-control rounded-3" placeholder="10-digit mobile"
        [class.is-invalid]="userForm.get('mobile')?.touched && userForm.get('mobile')?.invalid">
    </div>

    <div class="col-md-6">
      <label class="form-label fw-bold small text-muted">Email Address</label>
      <input type="email" formControlName="email" class="form-control rounded-3" placeholder="email@example.com"
        [class.is-invalid]="userForm.get('email')?.touched && userForm.get('email')?.invalid">
    </div>

    <div class="col-md-6" *ngIf="!isEdit">
      <label class="form-label fw-bold small text-muted">Password</label>
      <input type="password" formControlName="password" class="form-control rounded-3" placeholder="Min 6 characters"
        [class.is-invalid]="userForm.get('password')?.touched && userForm.get('password')?.invalid">
    </div>

    <div class="col-md-6">
      <label class="form-label fw-bold small text-muted">Library</label>
      <select formControlName="libraryId" class="form-select rounded-3"
        [class.is-invalid]="userForm.get('libraryId')?.touched && userForm.get('libraryId')?.invalid">
        <option [ngValue]="null">Select Library</option>
        <option *ngFor="let lib of libraries" [ngValue]="lib.id">{{lib.name}}</option>
      </select>
    </div>

    <div class="col-md-6">
      <label class="form-label fw-bold small text-muted">Role</label>
      <select formControlName="roleId" class="form-select rounded-3">
        <option [ngValue]="null" disabled>Select Role</option>
        <option *ngFor="let role of roles" [ngValue]="role.id">{{role.name}}</option>
      </select>
    </div>

    <div class="col-md-6 d-flex align-items-center pt-4" *ngIf="isCurrentUserSuperadmin">
      <div class="form-check form-switch">
        <input class="form-check-input" type="checkbox" formControlName="isSuperadmin" id="superadminSwitch">
        <label class="form-check-label text-muted small fw-bold" for="superadminSwitch">Grant Superadmin Access</label>
      </div>
    </div>

    <div class="col-12 mt-3">
      <label class="form-label fw-bold small text-muted">Profile Image</label>
      <div class="d-flex align-items-start gap-3">
        <div class="rounded-circle border overflow-hidden bg-light shadow-sm" style="width: 80px; height: 80px;" *ngIf="profileImagePreview">
          <img [src]="profileImagePreview" class="img-fluid w-100 h-100 object-fit-cover">
        </div>
        <div class="flex-grow-1">
          <input type="file" (change)="onFileChange($event)" class="form-control rounded-3" accept="image/*">
          <div class="form-text small text-muted">Recommended: Square image, max 2MB</div>
        </div>
      </div>
    </div>
  </div>

  <div class="mt-4 d-flex justify-content-end gap-2 border-top pt-3">
    <button type="button" class="btn btn-light rounded-3 px-4" (click)="cancelled.emit()" [disabled]="loading">Cancel</button>
    <button type="submit" class="btn btn-primary rounded-3 px-4 shadow-sm" [disabled]="loading">
      <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
      {{ isEdit ? 'Update User' : 'Register User' }}
    </button>
  </div>
</form>
