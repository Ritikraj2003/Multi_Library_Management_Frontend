<div class="table-responsive">
  <table class="table table-sm table-hover align-middle mb-0">
    <thead class="bg-light small text-uppercase text-muted">
      <tr>
        <th class="py-2">Date</th>
        <th class="py-2">Amount</th>
        <th class="py-2">Mode</th>
        <th class="py-2">Next Due</th>
        <th class="py-2">Notes</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngIf="loading">
        <td colspan="5" class="text-center py-4">
          <div class="spinner-border spinner-border-sm text-info"></div>
        </td>
      </tr>
      <tr *ngIf="!loading && payments.length === 0">
        <td colspan="5" class="text-center py-4 text-muted small">No payment records found.</td>
      </tr>
      <tr *ngFor="let p of payments">
        <td class="small">{{p.paymentDate | date:'mediumDate'}}</td>
        <td><span class="fw-bold text-dark">₹{{p.amount}}</span></td>
        <td>
          <span class="badge bg-light text-dark fw-normal border">{{p.paymentMode}}</span>
        </td>
        <td class="small text-muted">{{p.nextDueDate | date:'shortDate'}}</td>
        <td class="small extra-small text-muted" style="max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;" [title]="p.notes">
          {{p.notes || '-'}}
        </td>
      </tr>
    </tbody>
  </table>
</div>
