<nav class="navbar navbar-expand-lg navbar-light bg-white border-bottom px-4 py-2 sticky-top shadow-sm">
  <div class="container-fluid">
    <button class="btn btn-link p-0 me-3 d-lg-none" id="sidebarToggle" (click)="toggleSidebar()">
      <i class="bi bi-list fs-4"></i>
    </button>
    
    <div class="ms-auto d-flex align-items-center">
      <!-- Live Date and Time -->
      <div class="d-none d-md-flex align-items-center text-muted me-4 py-1 px-3 bg-light rounded-pill border" style="font-variant-numeric: tabular-nums; min-width: 240px; justify-content: center;">
        <i class="bi bi-clock me-2 text-primary"></i>
        <div class="fw-semibold text-dark" style="font-size: 0.85rem; letter-spacing: 0.2px;">
          {{ currentDate | date:'mediumDate' }} <span class="mx-1 text-muted">&bull;</span> {{ currentDate | date:'mediumTime' }}
        </div>
      </div>

      <div class="dropdown">
        <button class="btn btn-link text-dark text-decoration-none dropdown-toggle d-flex align-items-center" 
                type="button" id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false">
          <div class="avatar me-2 bg-primary text-white rounded-circle d-flex align-items-center justify-content-center">
            {{authService.currentUserValue?.fullName?.charAt(0)}}
          </div>
          <div class="d-none d-md-block text-start">
            <div class="fw-bold lh-1 small">{{authService.currentUserValue?.fullName}}</div>
            <div class="text-muted extra-small">{{authService.currentUserValue?.roleName}}</div>
          </div>
        </button>
        <ul class="dropdown-menu dropdown-menu-end shadow border-0" aria-labelledby="userDropdown">
          <li><button (click)="logout()" class="dropdown-item py-2 text-danger"><i class="bi bi-box-arrow-right me-2"></i> Logout</button></li>
        </ul>
      </div>
    </div>
  </div>
</nav>
